<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunark</title>

<style>
/* ---------- BASE ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(180deg, #0d0d13, #1f1f2e);
}

/* ---------- PANELS ---------- */
.panel {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.35), inset 0 0 18px rgba(255,255,255,0.05);
    margin-bottom: 32px;
    position: relative;
}

/* ---------- LAYOUT ---------- */
.container {
    max-width: 960px;
    margin: auto;
    padding: 80px 24px;
}

/* ---------- HEADER ---------- */
.header-flex {
    display: flex;
    align-items: flex-start;
    gap: 32px;
    position: relative;
}

.intro-image {
    width: 150px;
    height: 150px;
    border-radius: 18px;
    flex-shrink: 0;
}

.header-text {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}

h1 {
    font-size: 3.4em;
    margin: 0 0 8px 0;
    letter-spacing: 1.2px;
    line-height: 1.1;
}
.subtitle {
    opacity: 0.8;
    font-size: 1.1em;
    margin-bottom: 16px;
}

/* ---------- GIF ---------- */
.gif {
    position: absolute;
    width: 100px;
    pointer-events: none;
    opacity: 1.00;
    top: 20px;
    right: 20px;
}

/* ---------- BUTTONS ---------- */
.buttons {
    margin-top: 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}
.button-big {
    background-color: #9cff7a;
    color: #0e0f14;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 1.1em;
    cursor: pointer;
    text-decoration: none;
}
.button-small {
    background-color: rgba(255,255,255,0.12);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.95em;
    cursor: pointer;
    text-decoration: none;
}

/* ---------- LIMEKO PANEL ---------- */
.limeko {
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
}
.limeko::before {
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:28px;
    background: radial-gradient(circle, rgba(120,255,120,0.25), transparent 70%);
    z-index:-1;
    filter: blur(28px);
}
.limeko img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 20px;
    flex-shrink: 0;
}
.limeko-text {
    flex: 1;
}

/* ---------- TEXT GLOW ---------- */
.glow {
    color:#ffd6ff;
    text-shadow: 0 0 12px rgba(255,150,255,0.6), 0 0 28px rgba(255,120,255,0.4);
}
.lime {
    color:#9cff7a;
}

/* ---------- RESPONSIVE ---------- */
@media(max-width:700px){
    .header-flex {
        flex-direction: column;
        align-items: flex-start;
    }
    .header-text {
        width: 100%;
    }
    h1 { font-size: 2.6em; }
    .limeko {
        flex-direction: column;
        align-items: flex-start;
    }
    .limeko img {
        margin-bottom:16px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER PANEL -->
    <div class="panel header-flex">
        <img class="intro-image" src="profile.png" alt="Error">
        <div class="header-text">
            <h1 class="glow">Lunark</h1>
            <p class="subtitle">C# scripter • pro at something • silly idiot</p>
            <p>
                hi. i make weird nerdy things and sometimes they turn into
                game engines. (thanks Violet)
            </p>
        </div>
        <img class="gif" src="https://i.redd.it/iik342t1h3ie1.gif" alt="Error">
    </div>

    <!-- LIMEKO PANEL -->
    <div class="panel limeko">
        <img src="limeko.png" alt="Error">
        <div class="limeko-text">
            <h2 class="lime">Limeko Engine</h2>
            <p>
                A custom game engine I made to take all of the good things about other engines
                and throw them into one.
            </p>
            <div class="buttons">
                <a class="button-big" href="https://lunark.net/limeko" target="_blank">Go to Limeko</a>
                <a class="button-small" href="https://github.com/username/lunark" target="_blank">Source Code</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
