<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunark</title>

<style>
/* ---------- BASE ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: white;
    overflow-x: hidden;
    background: black;
}

/* SKY GRADIENT */
#sky {
    position: fixed;
    inset: 0;
    z-index: -2;
    transition: background 2s ease;
}
#sky::after {
    content:"";
    position:absolute;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.12;
}

/* ---------- PANELS ---------- */
.panel {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.35), inset 0 0 18px rgba(255,255,255,0.05);
    margin-bottom: 32px;
    position: relative;
}

/* LAYOUT */
.container {
    max-width: 960px;
    margin: auto;
    padding: 80px 24px;
}

/* ---------- HEADER ---------- */
h1 {
    font-size: 3.4em;
    margin-bottom: 12px;
    letter-spacing: 1.2px;
    line-height: 1.1;
}
.subtitle {
    opacity: 0.8;
    font-size: 1.1em;
    margin-bottom: 16px;
}

/* ---------- INTRO IMAGE ---------- */
.intro-image {
    width:150px;
    height:150px;
    border-radius:18px;
    margin-bottom:16px;
}

/* ---------- GIF ---------- */
.gif {
    position: absolute;
    width: 100px;
    pointer-events: none;
    opacity: 0.85;
}

/* ---------- LIMEKO PANEL ---------- */
.limeko {
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
}
.limeko::before {
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:28px;
    background: radial-gradient(circle, rgba(120,255,120,0.3), transparent 70%);
    z-index:-1;
    filter: blur(28px);
}
.limeko img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius:20px;
    flex-shrink: 0;
}

/* Limeko text */
.limeko-text {
    flex: 1;
}

/* ---------- TEXT GLOW ---------- */
.glow {
    color:#ffd6ff;
    text-shadow: 0 0 12px rgba(255,150,255,0.6), 0 0 28px rgba(255,120,255,0.4);
}
.lime {
    color:#9cff7a;
}

/* ---------- RESPONSIVE ---------- */
@media(max-width:700px){
    .limeko {
        flex-direction: column;
        align-items: flex-start;
    }
    .limeko img {
        margin-bottom:16px;
    }
    h1 { font-size: 2.6em; }
}
</style>
</head>

<body>
<div id="sky"></div>

<div class="container">

    <!-- HEADER PANEL -->
    <div class="panel">
        <img class="intro-image" src="profile.png" alt="Intro Image">
        <h1 class="glow">Lunark</h1>
        <p class="subtitle">C# scripter • pro at something • silly idiot</p>
        <p>
            hi. i make weird nerdy things and sometimes they turn into
            game engines. (thanks Violet)
        </p>
        <img class="gif" style="bottom:20px; right:20px;" src="https://i.redd.it/iik342t1h3ie1.gif" alt="Floating GIF">
    </div>

    <!-- LIMEKO PANEL -->
    <div class="panel limeko">
        <img src="limeko.png" alt="Limeko Engine">
        <div class="limeko-text">
            <h2 class="lime">Limeko Engine</h2>
            <p>
                A custom game engine i made to take all of the good things about other engines
                and throw them into one.
            </p>
        </div>
    </div>

</div>

<script>
/* ---------- TIME OF DAY SKY ---------- */
const sky = document.getElementById("sky");
const hour = new Date().getHours();
let gradient;

if(hour >= 6 && hour < 12) gradient = "linear-gradient(180deg,#ffd6f5,#bde0ff 60%,#0e0f14)";
else if(hour >= 12 && hour < 18) gradient = "linear-gradient(180deg,#a0d8ff,#ffc6ec 60%,#0e0f14)";
else if(hour >= 18 && hour < 21) gradient = "linear-gradient(180deg,#ff9ecb,#caa6ff 60%,#0e0f14)";
else gradient = "linear-gradient(180deg,#1a1b2e,#3a2a5a 60%,#0e0f14)";

sky.style.background = gradient;
</script>

</body>
</html>
