<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lunark — articles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf6f0;
      --bg2:       #f2ebe0;
      --bg3:       #ebe1d2;
      --text:      #2e2218;
      --text-soft: #7a6651;
      --accent:    #c4703a;
      --accent2:   #e8a97e;
      --accent3:   #8fb89a;
      --border:    #ddd0be;
      --card:      #fffcf7;
      --shadow:    rgba(100, 60, 20, 0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.22; pointer-events: none; z-index: 0; }
    .blob-1 { width: 520px; height: 520px; background: #e8b48a; top: -120px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #a8c8b0; bottom: 60px; left: -80px; }
    .blob-3 { width: 280px; height: 280px; background: #f0d0a0; top: 45%; left: 35%; }

    main {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.875rem;
      color: var(--text-soft);
      text-decoration: none;
      margin-bottom: 48px;
      transition: color 0.18s, gap 0.18s;
    }
    .back-link:hover { color: var(--accent); gap: 10px; }

    .page-header {
      margin-bottom: 56px;
      animation: fadeUp 0.7s ease both;
    }
    .page-header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .page-header h1 span { color: var(--accent); }
    .page-header p {
      margin-top: 12px;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.65;
      max-width: 520px;
    }

    /* ── filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .filter-chip {
      padding: 5px 15px;
      border-radius: 999px;
      font-size: 0.82rem;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .filter-chip:hover,
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── article list ── */
    .article-list {
      display: grid;
      gap: 16px;
      animation: fadeUp 0.7s 0.18s ease both;
    }

    .article-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow: 0 4px 20px var(--shadow);
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .article-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: linear-gradient(180deg, var(--accent2), var(--accent3));
      border-radius: 4px 0 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .article-card:hover { transform: translateY(-3px); box-shadow: 0 10px 36px var(--shadow); border-color: var(--accent2); }
    .article-card:hover::before { opacity: 1; }

    /* hidden by active filter */
    .article-card[hidden] { display: none; }

    .article-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .article-date { font-size: 0.78rem; color: var(--text-soft); }
    .article-tag {
      font-size: 0.75rem; padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg2); color: var(--text-soft);
    }
    .article-tag.rendering { background: #fdf0e4; border-color: #e8c4a0; color: #8a4a20; }
    .article-tag.engine    { background: #eaf3ec; border-color: #b0cdb8; color: #2e6040; }
    .article-tag.graphics  { background: #fdf0e4; border-color: #e8c4a0; color: #8a4a20; }
    .article-tag.systems   { background: #eef2fb; border-color: #b8c8e8; color: #304070; }

    .article-title {
      font-family: 'Lora', serif;
      font-size: 1.15rem; font-weight: 600;
      color: var(--text); line-height: 1.35;
      margin-bottom: 8px;
      transition: color 0.18s;
    }
    .article-card:hover .article-title { color: var(--accent); }

    .article-excerpt { font-size: 0.92rem; color: var(--text-soft); line-height: 1.65; }

    .article-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 16px; flex-wrap: wrap; gap: 8px;
    }
    .read-time { font-size: 0.78rem; color: var(--text-soft); }
    .read-more {
      font-size: 0.82rem; color: var(--accent);
      display: flex; align-items: center; gap: 5px;
      transition: gap 0.15s;
    }
    .article-card:hover .read-more { gap: 8px; }

    /* skeleton */
    .article-skeleton {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 26px 28px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .skel-line {
      border-radius: 6px;
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: skelShimmer 1.4s ease infinite;
    }
    @keyframes skelShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* empty state */
    .empty-state {
      color: var(--text-soft);
      font-size: 0.92rem;
      padding: 24px 0;
      font-style: italic;
    }

    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 32px;
      color: var(--text-soft); font-size: 0.82rem;
      border-top: 1px solid var(--border);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      main { padding: 48px 20px 80px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main>

    <a href="https://violetv0id.github.io/lunark.github.io/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      back to portfolio
    </a>

    <div class="page-header">
      <h1>articles <span>✦</span></h1>
      <p>
        write-ups on things i've built, broken, and figured out — graphics techniques,
        engine internals, experiments, and the occasional rabbit hole.
      </p>
    </div>

    <div class="filters" id="filters">
      <span class="filter-chip active" data-filter="all">all</span>
      <span class="filter-chip" data-filter="rendering">rendering</span>
      <span class="filter-chip" data-filter="engine">engine</span>
      <span class="filter-chip" data-filter="graphics">graphics</span>
      <span class="filter-chip" data-filter="systems">systems</span>
    </div>

    <div class="article-list" id="article-list">
      <!-- skeletons shown while loading -->
      <div class="article-skeleton">
        <div class="skel-line" style="height:12px; width:55%;"></div>
        <div class="skel-line" style="height:20px; width:75%;"></div>
        <div class="skel-line" style="height:12px; width:100%;"></div>
        <div class="skel-line" style="height:12px; width:80%;"></div>
      </div>
      <div class="article-skeleton">
        <div class="skel-line" style="height:12px; width:45%;"></div>
        <div class="skel-line" style="height:20px; width:85%;"></div>
        <div class="skel-line" style="height:12px; width:100%;"></div>
        <div class="skel-line" style="height:12px; width:65%;"></div>
      </div>
    </div>

  </main>

  <footer>✦<strong>lunark</strong>✦</footer>

  <script>
    const TAG_CLASSES = { rendering: 'rendering', graphics: 'graphics', engine: 'engine', systems: 'systems' };
    let allArticles = [];
    let activeFilter = 'all';

    function renderArticles() {
      const list = document.getElementById('article-list');
      list.innerHTML = '';

      const filtered = activeFilter === 'all'
        ? allArticles
        : allArticles.filter(a => (a.tags || []).includes(activeFilter));

      if (!filtered.length) {
        list.innerHTML = `<p class="empty-state">nothing here yet under <em>${activeFilter}</em> — check back soon ✦</p>`;
        return;
      }

      filtered.forEach(a => {
        const tags = (a.tags || []).map(t => `<span class="article-tag ${TAG_CLASSES[t] || ''}">${t}</span>`).join('');
        const card = document.createElement('a');
        card.href = `articles/${a.slug}.html`;
        card.className = 'article-card';
        card.dataset.tags = (a.tags || []).join(',');
        card.innerHTML = `
          <div class="article-meta">
            <span class="article-date">${a.date}</span>
            ${tags}
          </div>
          <div class="article-title">${a.title}</div>
          <p class="article-excerpt">${a.excerpt}</p>
          <div class="article-footer">
            <span class="read-time">${a.readTime}</span>
            <span class="read-more">
              read article
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </div>`;
        list.appendChild(card);
      });
    }

    async function loadArticles() {
      try {
        const res = await fetch('articles/manifest.json');
        if (!res.ok) throw new Error();
        allArticles = await res.json();
        renderArticles();
      } catch {
        document.getElementById('article-list').innerHTML =
          `<p class="empty-state">couldn't load articles — try refreshing the page.</p>`;
      }
    }

    // filter chip interaction
    document.getElementById('filters').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      renderArticles();
    });

    loadArticles();
  </script>

</body>
</html>
